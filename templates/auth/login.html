{% extends "base.html" %}

{% block title %}Login - Splitwise Clone{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card card-premium p-4">
            <div class="text-center mb-4">
                <span class="avatar-circle avatar-accent mx-auto mb-3" style="width: 60px; height: 60px; font-size: 1.5rem;">
                    <i class="bi bi-shield-lock-fill"></i>
                </span>
                <h3 class="fw-bold">Sign In</h3>
                <p class="text-muted">Access your group splits & balances</p>
            </div>
            
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="form-floating mb-3">
                    <input type="email" name="email" class="form-control form-control-premium" id="emailInput" placeholder="name@example.com" required>
                    <label for="emailInput">Email address</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" name="password" class="form-control form-control-premium" id="passwordInput" placeholder="Password" required>
                    <label for="passwordInput">Password</label>
                </div>
                
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" name="remember" id="rememberCheck">
                    <label class="form-check-label text-muted" for="rememberCheck">
                        Remember me on this device
                    </label>
                </div>
                
                <button type="submit" class="btn btn-accent w-100 py-2 rounded-3 fw-medium">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                </button>
            </form>
            
            <div class="text-center mt-4 pt-2 border-top">
                <span class="text-muted">Don't have an account?</span>
                <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-medium ms-1" style="color: var(--accent-hover);">Register here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
