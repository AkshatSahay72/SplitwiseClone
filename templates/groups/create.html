{% extends "base.html" %}

{% block title %}Create Group - Splitwise Clone{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-premium p-4">
            <div class="d-flex align-items-center mb-4 border-bottom pb-3">
                <a href="{{ url_for('groups.dashboard') }}" class="btn btn-outline-secondary btn-sm rounded-circle me-3" style="width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center;">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h3 class="fw-bold m-0"><i class="bi bi-people-fill text-accent me-2"></i>Create New Group</h3>
            </div>
            
            <form action="{{ url_for('groups.create_group') }}" method="POST">
                <div class="mb-3">
                    <label for="groupName" class="form-label fw-medium">Group Name</label>
                    <input type="text" name="name" class="form-control form-control-premium" id="groupName" placeholder="e.g. Goa Trip, Apartment 304, Dinner Splitting" required>
                </div>
                
                <div class="mb-4">
                    <label for="groupDescription" class="form-label fw-medium">Description (Optional)</label>
                    <textarea name="description" class="form-control form-control-premium" id="groupDescription" rows="3" placeholder="What is this group for?"></textarea>
                </div>
                
                <button type="submit" class="btn btn-accent w-100 py-2 rounded-3 fw-medium">
                    <i class="bi bi-check-lg me-1"></i> Create Group
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
